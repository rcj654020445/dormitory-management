name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: Go Backend — Architecture Lint
  # ─────────────────────────────────────────────────────
  lint-architecture:
    name: "Go: Architecture Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run architecture linter
        run: go run scripts/lint-deps/main.go

      - name: Run quality linter
        run: go run scripts/lint-quality/main.go

  # ─────────────────────────────────────────────────────
  # Job 2: Go Backend — Tests
  # ─────────────────────────────────────────────────────
  test-go:
    name: "Go: Tests"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dormitory
          POSTGRES_PASSWORD: password
          POSTGRES_DB: dormitory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run migrations
        run: go run ./cmd/migrate up
        env:
          DATABASE_URL: postgres://dormitory:password@localhost:5432/dormitory?sslmode=disable
          JWT_SECRET: "ci-jwt-secret-change-in-production"

      - name: Run tests
        run: go test -race -cover ./...
        env:
          DATABASE_URL: postgres://dormitory:password@localhost:5432/dormitory?sslmode=disable
          JWT_SECRET: "ci-jwt-secret-change-in-production"
          REDIS_URL: ""

      - name: Build
        run: go build ./cmd/server

  # ─────────────────────────────────────────────────────
  # Job 3: Vue3 Frontend — Lint & Type Check
  # ─────────────────────────────────────────────────────
  lint-frontend:
    name: "Vue3: Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Run architecture linter
        run: node ../scripts/lint-deps.mjs

  # ─────────────────────────────────────────────────────
  # Job 4: Vue3 Frontend — Unit Tests
  # ─────────────────────────────────────────────────────
  test-frontend:
    name: "Vue3: Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:unit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────
  # Job 5: Vue3 Frontend — Build
  # ─────────────────────────────────────────────────────
  build-frontend:
    name: "Vue3: Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────────────────
  # Dependency Review (security)
  # ─────────────────────────────────────────────────────
  dependency-review:
    name: "Dependency Review"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
