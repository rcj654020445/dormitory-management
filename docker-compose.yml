version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dormitory
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: dormitory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dormitory"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
